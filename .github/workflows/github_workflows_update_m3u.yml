name: Update M3U URL

on:
  schedule:
    # 北京时间 06:00 (UTC 22:00) 和 12:00 (UTC 04:00)
    - cron: '0 22 * * *'
    - cron: '0 4 * * *'
  workflow_dispatch: # 允许手动触发测试

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 需要写入权限以提交更改

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find and Replace URL in all result.m3u files
        run: |
          # 查找所有名为 result.m3u 的文件（包括子目录）
          # 使用 sed 进行原地替换，处理特殊字符
          find . -name "result.m3u" -type f | while read -r file; do
            echo "Processing: $file"
            # 使用 | 作为分隔符避免与 URL 中的 / 冲突
            sed -i 's|http://172.50.0.2/epg|https://gh-proxy.com/https://raw.githubusercontent.com/skzcd/output/epg|g' "$file"
          done

      - name: Check for changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changes_detected == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Replace EPG URL in result.m3u files"
          file_pattern: "**/result.m3u"
          commit_options: '--no-verify'