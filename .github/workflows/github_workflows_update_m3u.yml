name: Update M3U EPG URL

on:
  schedule:
    # 北京时间每天 6:00 和 12:00 执行
    # UTC 时间对应为 22:00 (前一天) 和 04:00
    - cron: '0 22 * * *'
    - cron: '0 4 * * *'
  workflow_dispatch: # 允许手动触发测试

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予写入仓库权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace EPG URL in all .m3u files
        run: |
          # 查找当前目录及子目录下所有 .m3u 文件
          # -type f: 只查找文件
          # -name "*.m3u": 匹配后缀
          # -exec sed -i ...: 直接原地替换
          # 注意：macOS 和 Linux 的 sed 语法略有不同，GitHub Actions runner 是 Ubuntu (Linux)，所以使用标准 GNU sed
          find . -type f -name "*.m3u" -exec sed -i 's|http://172.50.0.2/epg|https://gh-proxy.com/https://raw.githubusercontent.com/skzcd/output/main/epg|g' {} +

      - name: Check for changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "Modified files:"
            git status --porcelain
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changes_detected == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Replace EPG URL in all .m3u files"
          # 提交所有变更的文件，或者明确指定 *.m3u
          file_pattern: '*.m3u' 
