
name: Update M3U EPG URL

on:
  schedule:
    # 北京时间每天 6:00 和 12:00 执行
    # UTC 时间对应为 22:00 (前一天) 和 04:00
    - cron: '0 22 * * *'
    - cron: '0 4 * * *'
  workflow_dispatch: # 允许手动触发测试

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予写入仓库权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find and Replace URL in all result.m3u files
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "http://172.50.0.2/epg"
          replace: "https://gh-proxy.com/https://raw.githubusercontent.com/skzcd/output/epg"
          path: "." # 在当前目录及所有子目录中搜索
          include: "**/result.m3u" # 仅匹配名为 result.m3u 的文件
          regex: false

      - name: Check for changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changes_detected == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Replace EPG URL in result.m3u files"
          file_pattern: "**/result.m3u"